name: Keycloak Security Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  security-scan:
    name: DAST Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Start Keycloak
        run: |
          docker run -d --name keycloak \
            -e KEYCLOAK_ADMIN=admin \
            -e KEYCLOAK_ADMIN_PASSWORD=adminpass \
            -e KC_HEALTH_ENABLED=true \
            -e KC_METRICS_ENABLED=true \
            -p 8080:8080 \
            -p 9000:9000 \
            quay.io/keycloak/keycloak:26.0.7 start-dev

          echo "Waiting for Keycloak..."
          for i in $(seq 1 90); do
            if curl -sf http://localhost:9000/health/ready > /dev/null 2>&1; then
              echo "Keycloak ready after $((i*2))s"
              break
            fi
            sleep 2
          done

          if ! curl -sf http://localhost:9000/health/ready > /dev/null 2>&1; then
            echo "::error::Keycloak failed to become ready"
            docker logs keycloak | tail -50
            exit 1
          fi

      - name: Import realm config
        run: |
          TOKEN=$(curl -s -X POST http://localhost:8080/realms/master/protocol/openid-connect/token \
            -d "grant_type=password&client_id=admin-cli&username=admin&password=adminpass" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

          curl -s -X POST http://localhost:8080/admin/realms \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d @realm-config.json || echo "Realm may already exist"

      - name: Run Keycloak Security Scanner
        id: scan
        shell: bash {0}
        run: |
          docker network create scan-net
          docker network connect scan-net keycloak

          mkdir -p results
          chmod 777 results

          docker run --rm --network scan-net \
            -v $(pwd)/results:/app/results \
            ghcr.io/roymoskitov/keycloak-scanner:latest \
            --cli \
            --keycloak-audit.server-url=http://keycloak:8080 \
            --keycloak-audit.realm=my-app \
            --keycloak-audit.client-id=admin-cli \
            --keycloak-audit.username=admin \
            --keycloak-audit.password=adminpass \
            --output=/app/results/results.json \
            --format=json \
            --spring.main.web-application-type=none \
            2>scanner.log | tee scan-output.txt

          if [ -f results/results.json ]; then
            DETECTED=$(python3 -c "import json; d=json.load(open('results/results.json')); print(d['summary']['detected'])")
            TOTAL=$(python3 -c "import json; d=json.load(open('results/results.json')); print(d['summary']['totalChecks'])")
            OK=$(python3 -c "import json; d=json.load(open('results/results.json')); print(d['summary']['ok'])")

            echo "detected=$DETECTED" >> $GITHUB_OUTPUT

            echo "## Keycloak Security Scan" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total checks | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| Issues found | **$DETECTED** |" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | $OK |" >> $GITHUB_STEP_SUMMARY

            if [ -f results/attacks.json ]; then
              FULLY=$(jq '[.[] | select(.status=="FULLY_ENABLED")] | length' results/attacks.json)
              PARTIAL=$(jq '[.[] | select(.status=="PARTIALLY_ENABLED")] | length' results/attacks.json)
              MITIGATED=$(jq '[.[] | select(.status=="MITIGATED")] | length' results/attacks.json)

              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Attack Vectors (CAPEC / MITRE ATT&CK)" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "**Summary:** :red_circle: $FULLY fully enabled / :yellow_circle: $PARTIAL partial / :green_circle: $MITIGATED mitigated" >> $GITHUB_STEP_SUMMARY

              ROW='"| \(.vector.capecId) | \(.vector.name) | `\(.vector.attckTechnique)` | \(.vector.severity) | \(.coveragePercent)% (\(.triggeredCheckIds | length)/\(.vector.requiredCheckIds | length)) |"'

              if [ "$FULLY" -gt 0 ]; then
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "#### :red_circle: Fully Enabled — exploitable now" >> $GITHUB_STEP_SUMMARY
                echo "| CAPEC | Attack | ATT&CK | Severity | Coverage |" >> $GITHUB_STEP_SUMMARY
                echo "|-------|--------|--------|----------|----------|" >> $GITHUB_STEP_SUMMARY
                jq -r ".[] | select(.status==\"FULLY_ENABLED\") | $ROW" results/attacks.json >> $GITHUB_STEP_SUMMARY
              fi

              if [ "$PARTIAL" -gt 0 ]; then
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "#### :yellow_circle: Partially Enabled — some prerequisites met" >> $GITHUB_STEP_SUMMARY
                echo "| CAPEC | Attack | ATT&CK | Severity | Coverage |" >> $GITHUB_STEP_SUMMARY
                echo "|-------|--------|--------|----------|----------|" >> $GITHUB_STEP_SUMMARY
                jq -r ".[] | select(.status==\"PARTIALLY_ENABLED\") | $ROW" results/attacks.json >> $GITHUB_STEP_SUMMARY
              fi

              if [ "$MITIGATED" -gt 0 ]; then
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "<details><summary>:green_circle: Mitigated ($MITIGATED) — click to expand</summary>" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "| CAPEC | Attack | ATT&CK | Severity | Coverage |" >> $GITHUB_STEP_SUMMARY
                echo "|-------|--------|--------|----------|----------|" >> $GITHUB_STEP_SUMMARY
                jq -r ".[] | select(.status==\"MITIGATED\") | $ROW" results/attacks.json >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "</details>" >> $GITHUB_STEP_SUMMARY
              fi

              echo "fully_enabled=$FULLY" >> $GITHUB_OUTPUT
            fi

            echo "Scan complete: $DETECTED issues found out of $TOTAL checks"
          else
            echo "Scanner failed to produce results"
            cat scanner.log
            exit 1
          fi

      - name: Run SARIF export
        if: always() && hashFiles('results/results.json') != ''
        run: |
          docker run --rm --network scan-net \
            -v $(pwd)/results:/app/results \
            ghcr.io/roymoskitov/keycloak-scanner:latest \
            --cli \
            --keycloak-audit.server-url=http://keycloak:8080 \
            --keycloak-audit.realm=my-app \
            --keycloak-audit.client-id=admin-cli \
            --keycloak-audit.username=admin \
            --keycloak-audit.password=adminpass \
            --output=/app/results/results.sarif \
            --format=sarif \
            --spring.main.web-application-type=none \
            2>>scanner.log || echo "SARIF export failed, continuing"

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('results/results.sarif') != ''
        with:
          sarif_file: results/results.sarif
          category: keycloak-dast

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-results
          path: |
            results/
            scanner.log

      - name: Gate - fail if critical issues found
        env:
          DETECTED: ${{ steps.scan.outputs.detected }}
          THRESHOLD: '50'
        run: |
          if [ -z "$DETECTED" ]; then
            echo "No scan results available"
            exit 1
          fi
          if [ "$DETECTED" -gt "$THRESHOLD" ]; then
            echo "::error::Security scan found $DETECTED issues (threshold: $THRESHOLD). Fix critical findings before deploying."
            exit 1
          fi
          echo "Security scan passed with $DETECTED findings (threshold: $THRESHOLD)"

      - name: Cleanup
        if: always()
        run: |
          docker stop keycloak 2>/dev/null || true
          docker rm keycloak 2>/dev/null || true
          docker network rm scan-net 2>/dev/null || true
